services:
  db:
    image: postgres:16
    container_name: delivery-postgres
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_user -d delivery_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: delivery-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://delivery_user:delivery_pass@db:5432/delivery_db
    ports:
      - "8000:8000"

volumes:
  postgres_data: